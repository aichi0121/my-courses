<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8"/>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📖</text></svg>"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>課程連結管理</title>
<style>

:root{
  --bg:#eef3f7;
  --panel:#ffffff;
  --panel-soft:#f7fafc;
  --text:#223047;
  --sub:#6b7a90;
  --muted:#8ea0b5;
  --border:#d9e2ec;
  --accent:#4f6fe8;
  --accent2:#139c95;
  --accent-soft:#e8efff;
  --green:#1f9d64;
  --red:#d84c4c;
  --amber:#c98218;
  --shadow:0 18px 50px rgba(34,48,71,.10);
  --shadow-sm:0 8px 24px rgba(34,48,71,.08);
  --radius:8px;
}
*{box-sizing:border-box;margin:0;padding:0;}
html{background:var(--bg);}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
  min-height:100vh;
  padding:18px 18px 72px;
  color:var(--text);
  background:
    linear-gradient(180deg,rgba(79,111,232,.10),rgba(19,156,149,0) 280px),
    radial-gradient(circle at top left,rgba(19,156,149,.12),transparent 320px),
    var(--bg);
  line-height:1.45;
}
button,input,select,textarea{font:inherit;}
button{touch-action:manipulation;}
.wrap,.hd{width:min(1180px,100%);margin:0 auto;}
.hd{
  display:flex;align-items:center;justify-content:space-between;gap:16px;
  margin-bottom:14px;padding:4px 2px;
}
.hd h1{font-size:1.24rem;font-weight:850;letter-spacing:0;color:#1f2b3f;}
.hd h1 a{display:flex;align-items:center;gap:8px;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-avatar{width:34px;height:34px;border-radius:50%;border:2px solid #fff;box-shadow:var(--shadow-sm);background:#fff;}
.logout-btn,.user-info>button:not(.logout-btn){
  min-height:34px;background:rgba(255,255,255,.76);border:1px solid var(--border);border-radius:999px;
  padding:6px 12px;font-size:.74rem;font-weight:750;color:var(--sub);cursor:pointer;box-shadow:0 2px 10px rgba(34,48,71,.05);
}
.user-info>button:not(.logout-btn){width:38px;height:38px;padding:0;font-size:1rem;}
.tabs{
  position:sticky;top:10px;z-index:30;display:grid;grid-template-columns:repeat(5,1fr);gap:6px;
  background:rgba(255,255,255,.78);border:1px solid rgba(217,226,236,.86);border-radius:12px;
  padding:6px;margin-bottom:14px;box-shadow:var(--shadow-sm);backdrop-filter:blur(14px);
}
.tb{
  min-height:42px;border:none;background:transparent;border-radius:8px;font-size:.78rem;font-weight:800;cursor:pointer;color:var(--sub);
  display:flex;align-items:center;justify-content:center;gap:5px;white-space:nowrap;
}
.tb:hover{background:#f4f7fb;color:var(--text);}
.tb.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 18px rgba(79,111,232,.20);}
.tc{display:none;}.tc.on{display:block;}
.card,.qcard,.cc,.buyer-card,.group-card{
  background:rgba(255,255,255,.92);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow-sm);
}
.card,.qcard{padding:18px;margin-bottom:14px;}
.card h2,.qcard h2{font-size:.98rem;color:var(--text);font-weight:850;margin-bottom:12px;}
.fg{margin-bottom:13px;}
.fg label{display:block;font-size:.74rem;color:var(--sub);margin-bottom:6px;font-weight:800;}
.fg input,.fg textarea,.fg select,.qinp,.num-inp,.group-add input,.acrow input,.sort-row select,.group-filter select{
  width:100%;min-height:42px;padding:10px 12px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;background:#fff;color:var(--text);outline:none;
  transition:border-color .15s,box-shadow .15s,background .15s;
}
.fg textarea,.barea{resize:vertical;min-height:76px;}
.fg input:focus,.fg textarea:focus,.fg select:focus,.qinp:focus,.num-inp:focus,.sbar input:focus,.group-add input:focus,.acrow input:focus{
  border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,111,232,.14);
}
.row2,.qrow,.bacts,.macts,.acrow,.group-add,.group-course-actions,.sub-actions{display:flex;gap:9px;align-items:center;}
.btn-g,.qbtn,.bcopyall,.bca,.msave,.bimp,.send-btn{
  border:none;border-radius:8px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-weight:850;cursor:pointer;
  min-height:42px;padding:10px 14px;box-shadow:0 9px 22px rgba(79,111,232,.18);
}
.btn-g{width:100%;margin-top:4px;}
.btn-sm,.btn-yt,.bparse,.bcopy1,.add-pur-btn,.hist-toggle,.mcancel{
  border:1.5px solid #cfdaf0;background:var(--accent-soft);color:var(--accent);border-radius:8px;font-weight:800;cursor:pointer;min-height:38px;padding:8px 12px;
}
.btn-yt,.add-pur-btn,.hist-toggle{width:100%;border-style:dashed;display:flex;align-items:center;justify-content:center;gap:6px;}
.btn-sm{white-space:nowrap;font-size:.78rem;}
.fbar{display:flex;gap:7px;overflow-x:auto;padding:1px 0 8px;margin-bottom:9px;scrollbar-width:none;}
.fbar::-webkit-scrollbar{display:none;}
.ftag{padding:8px 13px;border-radius:999px;font-size:.76rem;font-weight:850;cursor:pointer;border:1px solid var(--border);background:#fff;color:var(--sub);white-space:nowrap;flex-shrink:0;}
.ftag.on{background:#24324a;color:#fff;border-color:#24324a;box-shadow:0 6px 18px rgba(36,50,74,.15);}
.sbar input{width:100%;min-height:44px;padding:10px 13px;border:1.5px solid var(--border);border-radius:8px;font-size:.88rem;background:#fff;color:var(--text);outline:none;margin-bottom:11px;}
.sort-row{display:flex;align-items:center;gap:9px;margin-bottom:12px;}
.sort-row label,.group-filter label{font-size:.74rem;color:var(--sub);font-weight:850;white-space:nowrap;}
.cnt{font-size:.76rem;color:var(--sub);margin-bottom:10px;font-weight:750;}
.ghd{display:flex;align-items:center;justify-content:space-between;padding:11px 14px;background:#24324a;border-radius:8px;margin:13px 0 8px;cursor:pointer;user-select:none;box-shadow:var(--shadow-sm);}
.ghd-l{display:flex;align-items:center;gap:8px;min-width:0;}
.ghd-t{font-size:.9rem;font-weight:850;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ghd-n{font-size:.72rem;color:#fff;background:rgba(255,255,255,.16);padding:3px 8px;border-radius:999px;}
.garr{font-size:.78rem;color:#fff;transition:transform .2s;display:inline-block;}.garr.open{transform:rotate(90deg);}
.gbody{margin-bottom:14px;}
.cc{padding:14px;margin-bottom:10px;}
.cc.nl{border-color:#f2b7b7;background:#fffafa;}
.ctop,.buyer-top,.group-top,.pr-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;}
.ctitle{font-size:.96rem;font-weight:850;color:var(--text);line-height:1.45;flex:1;}
.cbtns,.buyer-btns{display:flex;gap:5px;flex-shrink:0;}
.cbtn{background:#f6f9fc;border:1px solid transparent;font-size:1rem;cursor:pointer;padding:4px 7px;border-radius:7px;color:var(--sub);}
.cbtn:hover{background:var(--accent-soft);border-color:#d8e0ff;color:var(--accent);}
.lr{display:grid;grid-template-columns:auto minmax(0,1fr) auto;align-items:center;gap:8px;margin-bottom:7px;}
.badge,.bst,.pr-st,.ci-tag{font-size:.68rem;font-weight:850;padding:3px 8px;border-radius:999px;white-space:nowrap;}
.byt{background:#fff1f1;color:#d83838;}.bcl{background:#e7f7ff;color:#2274a5;}.bnt{background:#e9fbf0;color:#1b7e51;}.bnl{background:#fff5f5;color:#c53030;border:1px solid #fed7d7;margin-bottom:7px;display:inline-flex;}
.ltext{font-size:.8rem;color:var(--sub);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0;}
.ltext a{color:var(--accent);text-decoration:none;}
.bcopy{padding:5px 9px;font-size:.72rem;background:var(--accent-soft);color:var(--accent);border:none;border-radius:7px;cursor:pointer;font-weight:850;white-space:nowrap;}
.bcopy.ok{background:#dff8ea;color:#13834f;}
.bca{width:100%;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:6px;}
.bca:disabled,.send-btn:disabled,.bimp:disabled{opacity:.45;cursor:not-allowed;background:#dce4ee;color:var(--sub);box-shadow:none;}
.send-btn.ok{background:linear-gradient(135deg,var(--green),#2f8e6c);}
.empty,.qempty{text-align:center;color:var(--sub);font-size:.9rem;padding:36px 0;}
.qhint,.bhint,.num-hint{font-size:.76rem;color:var(--sub);line-height:1.6;}
.qhint{margin-bottom:12px;}.qhint code{background:var(--accent-soft);padding:2px 6px;border-radius:5px;color:var(--accent);}
.qrow{align-items:stretch;margin-bottom:12px;}.qinp{flex:1;resize:none;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}.qbtn{min-width:92px;}
.qitem,.pi,.sub-row,.sub-card,.pr-row,.hist-summary,.group-course-box{background:var(--panel-soft);border:1px solid var(--border);border-radius:8px;}
.qitem{padding:13px;margin-bottom:10px;}.qname{font-size:.95rem;font-weight:850;margin-bottom:9px;}.qnf{font-size:.82rem;color:var(--red);background:#fff3f3;padding:9px 12px;border-radius:8px;border:1px solid #ffd0d0;margin-bottom:7px;}
.barea{width:100%;padding:12px;border:1.5px solid var(--border);border-radius:8px;font-size:.84rem;background:#fff;color:var(--text);outline:none;line-height:1.7;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.prev-wrap{margin-top:12px;}.prev-wrap h4{font-size:.78rem;color:var(--sub);margin-bottom:7px;}.pi{padding:8px 10px;margin-bottom:6px;font-size:.78rem;}.pi .pn{font-weight:850;margin-bottom:3px;}.pi .pl{color:var(--sub);font-size:.72rem;}
.bsec-tabs{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px;}
.bstab{min-height:44px;border:1.5px solid var(--border);border-radius:8px;font-size:.84rem;font-weight:850;cursor:pointer;background:#fff;color:var(--sub);text-align:center;}
.bstab.on{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-color:transparent;box-shadow:var(--shadow-sm);}
.group-filter{display:flex;gap:9px;align-items:center;margin-bottom:10px;}
.group-filter select{flex:1;}
.group-card,.buyer-card{padding:15px;margin-bottom:12px;}
.group-name,.buyer-name{font-size:1rem;font-weight:850;color:var(--text);min-width:0;}
.group-meta{font-size:.75rem;color:var(--sub);margin-top:5px;font-weight:650;}
.group-course-box{margin-top:11px;padding:11px;}
.group-member-row{display:grid;grid-template-columns:minmax(0,1fr) 150px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid var(--border);}
.group-member-row:last-child{border-bottom:none;}
.group-member-row select{width:100%;padding:8px;border:1.5px solid var(--border);border-radius:8px;background:#fff;}
.group-member-name{font-size:.82rem;font-weight:800;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.nbuyer-row{display:grid;grid-template-columns:minmax(0,1fr) 144px 36px;gap:7px;align-items:center;margin-bottom:7px;}.nbuyer-row.no-pay{grid-template-columns:minmax(0,1fr) 36px;}.nbuyer-row.no-pay .nbuyer-status{display:none;}.nbuyer-row button{height:38px;background:#fff;border:1.5px solid var(--border);border-radius:8px;color:var(--sub);cursor:pointer;font-size:.9rem;}
.buyer-top{align-items:center;margin-bottom:9px;}.bst{display:inline-flex;align-items:center;margin-left:7px;background:#eef7ff;color:#226999;}.st-paid{background:#e6f8ee;color:#14794c;}.st-pre{background:#fff3d8;color:#a06108;}
.pr-row{padding:10px 11px;margin-bottom:8px;}.pr-label{font-size:.76rem;font-weight:850;color:var(--sub);}.pr-done{background:#dff8ea;color:#14834f;}.pr-pend{background:#fff0cb;color:#a35c00;}.pr-toggle{width:100%;display:flex;align-items:center;justify-content:space-between;gap:10px;background:none;border:none;padding:0;cursor:pointer;text-align:left;}.pr-body{margin-top:8px;}.pr-body.collapsed{display:none;}
.hist-summary{padding:10px 12px;margin-bottom:9px;font-size:.8rem;color:var(--sub);}.hist-toggle{margin-bottom:9px;}.hist-body.collapsed{display:none;}
.ci{display:grid;grid-template-columns:auto 34px minmax(0,1fr) auto;align-items:center;gap:7px;padding:7px 0;border-bottom:1px solid var(--border);}.ci:last-child{border-bottom:none;}.ci-num{font-size:.76rem;font-weight:850;color:var(--accent);width:auto;}.ci-name{font-size:.82rem;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.ci-sent{background:#dff8ea;color:#13834f;}.ci-ready{background:#e7efff;color:#245ad7;}.ci-nolink{background:#fff0f0;color:#c93434;}.ci-cb{width:17px;height:17px;cursor:pointer;accent-color:var(--accent);}
.num-inp{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}.parsed-nums{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px;}.pnum{padding:3px 8px;background:var(--accent-soft);color:var(--accent);border-radius:999px;font-size:.74rem;font-weight:850;}.pnum.nf{background:#fff3f3;color:#c53030;}
.yt-row,.sub-yt-row{display:grid;grid-template-columns:96px minmax(0,1fr) 32px;gap:7px;margin-bottom:7px;align-items:center;}.yt-row .lbl,.yt-row .url,.sub-row input{padding:9px;border:1.5px solid var(--border);border-radius:8px;background:#fff;min-width:0;}.yt-row .del,.sub-row .sub-del,.sub-yt-row .sub-yt-del{background:none;border:none;font-size:1rem;cursor:pointer;color:var(--sub);}
.sub-row{padding:11px;margin-bottom:9px;}.sub-row .sub-top{display:flex;gap:7px;align-items:center;margin-bottom:7px;}.sub-row .sub-title{flex:1;}.sub-card{margin-top:9px;overflow:hidden;}.sub-card-title{display:flex;align-items:center;justify-content:space-between;gap:8px;width:100%;background:none;border:none;padding:10px 11px;font-size:.84rem;font-weight:850;color:var(--text);text-align:left;cursor:pointer;}.sub-card-title span:first-child{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}.sub-card-arrow{font-size:.78rem;color:var(--sub);transition:transform .2s;}.sub-card-title.open .sub-card-arrow{transform:rotate(180deg);}.sub-card-body{padding:0 11px 11px;}.sub-card-body.collapsed{display:none;}.sub-actions .bcopy{flex:1;}
.mo{display:none;position:fixed;inset:0;background:rgba(17,24,39,.48);z-index:100;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(3px);}.mo.open{display:flex;}.mbox{background:#fff;border-radius:10px;padding:20px;width:min(560px,100%);max-height:90vh;overflow-y:auto;box-shadow:0 24px 80px rgba(17,24,39,.28);border:1px solid var(--border);}.mbox h3{font-size:1.02rem;margin-bottom:14px;}.mcancel{flex:1;background:#f2f6fb;color:var(--sub);}.msave{flex:2;}
.catli{display:flex;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;margin-bottom:7px;background:var(--panel-soft);border:1px solid var(--border);}.catli span{flex:1;font-size:.88rem;}.catli button{background:none;border:none;cursor:pointer;font-size:1rem;padding:3px 6px;border-radius:6px;color:var(--sub);}
#toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(60px);background:#1f2b3f;color:#fff;padding:10px 18px;border-radius:999px;font-size:.84rem;font-weight:750;opacity:0;transition:all .3s;z-index:999;white-space:nowrap;pointer-events:none;box-shadow:var(--shadow);}#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
#login-screen{position:fixed;inset:0;background:linear-gradient(135deg,#223047,#139c95);display:flex;align-items:center;justify-content:center;z-index:9999;padding:20px;}#login-screen.hide{display:none;}.login-box{background:#fff;border-radius:12px;padding:34px 28px;text-align:center;max-width:360px;width:100%;box-shadow:var(--shadow);}.login-box h2{font-size:1.16rem;margin-bottom:7px;}.login-box p{font-size:.86rem;color:var(--sub);margin-bottom:24px;}.login-btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;padding:13px;background:#fff;border:1.5px solid var(--border);border-radius:8px;font-size:.92rem;font-weight:850;cursor:pointer;color:var(--text);box-shadow:var(--shadow-sm);}.login-btn img{width:20px;height:20px;}
#loading-screen{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9998;}#loading-screen.hide{display:none;}.spinner{width:38px;height:38px;border:4px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}@keyframes spin{to{transform:rotate(360deg);}}
@media (min-width:900px){
  body{padding-top:26px;}
  .tc#tc-add.on,.tc#tc-batch.on,.tc#tc-quick.on{max-width:760px;margin:0 auto;}
  #tc-list.on .sbar,#tc-list.on .sort-row,#tc-list.on .cnt,#tc-list.on #list,#tc-list.on #fbar{max-width:900px;margin-left:auto;margin-right:auto;}
  #tc-buyers.on{max-width:980px;margin:0 auto;}
  .cc{padding:16px;}.buyer-card,.group-card{padding:16px;}
}
@media (max-width:720px){
  body{padding:12px 10px 72px;}
  .hd{align-items:flex-start;margin-bottom:10px;}.hd h1{font-size:1.05rem;padding-top:7px;}.user-info{gap:6px;}.logout-btn{padding:6px 10px;}.user-avatar{width:30px;height:30px;}
  .tabs{top:6px;grid-template-columns:repeat(5,minmax(64px,1fr));overflow-x:auto;padding:5px;gap:5px;margin-left:-2px;margin-right:-2px;}.tb{font-size:.72rem;min-height:40px;}
  .card,.qcard,.cc,.buyer-card,.group-card{padding:13px;border-radius:8px;}
  .row2,.qrow,.bacts,.macts,.acrow,.group-add,.group-course-actions{flex-direction:column;align-items:stretch;}
  .qbtn,.btn-sm,.bparse,.bimp,.mcancel,.msave{width:100%;}
  .lr{grid-template-columns:auto minmax(0,1fr);}.lr .bcopy{grid-column:1 / -1;width:100%;}
  .yt-row,.sub-yt-row{grid-template-columns:1fr 32px;}.yt-row .lbl,.sub-yt-row .sub-yt-lbl{grid-column:1 / -1;width:100%;}
  .nbuyer-row{grid-template-columns:1fr;}.nbuyer-row.no-pay{grid-template-columns:1fr;}.nbuyer-row button{width:100%;}
  .group-member-row{grid-template-columns:1fr;}.buyer-top,.group-top{align-items:flex-start;}.bst{margin-left:0;margin-top:5px;}.buyer-name{display:flex;flex-direction:column;align-items:flex-start;gap:2px;}
  .pr-top{align-items:flex-start;}.ci{grid-template-columns:auto 28px minmax(0,1fr);}.ci-tag{grid-column:3 / 4;justify-self:start;margin-top:2px;}.send-btn{font-size:.78rem;}
  .mbox{padding:16px;max-height:88vh;}
}


/* responsive polish pass */
@media (min-width:900px){
  .wrap,.hd{width:min(1040px,100%);}
  #tc-buyers.on{max-width:900px;}
  #tc-list.on .sbar,#tc-list.on .sort-row,#tc-list.on .cnt,#tc-list.on #list,#tc-list.on #fbar{max-width:860px;}
  .buyer-card,.group-card,.cc{box-shadow:0 10px 28px rgba(34,48,71,.07);}
}
@media (min-width:1280px){.wrap,.hd{width:min(1080px,100%);}}
.ci{grid-template-columns:auto 36px minmax(0,1fr) max-content;}
.ci-name{min-width:0;}
.ci-tag{justify-self:end;}
#nb-buyers-wrap.is-hidden,#nb-payment-wrap.is-hidden{display:none!important;}
@media (max-width:720px){
  .wrap,.hd{width:100%;}
  .tabs{grid-template-columns:repeat(5,72px);}
  .ci{grid-template-columns:auto 30px minmax(0,1fr);}
  .ci-tag{grid-column:3;justify-self:start;}
}


/* final stability fixes */
.wrap,.hd{width:min(980px,100%)!important;}
#tc-buyers.on,#tc-list.on{max-width:860px!important;margin:0 auto!important;}
.card,.qcard,.buyer-card,.group-card,.cc{border-radius:8px!important;}
.buyer-card,.group-card{margin-bottom:12px!important;}
.pr-row{display:block!important;overflow:hidden;}
.send-btn{display:flex!important;align-items:center!important;justify-content:center!important;width:100%!important;min-height:42px!important;margin-top:9px!important;padding:10px 12px!important;border:none!important;border-radius:8px!important;font-size:.82rem!important;font-weight:850!important;line-height:1.35!important;text-align:center!important;white-space:normal!important;}
.send-btn:disabled{opacity:1!important;}
.ci{display:grid!important;grid-template-columns:20px 34px minmax(0,1fr) max-content!important;align-items:center!important;column-gap:8px!important;row-gap:4px!important;}
.ci-cb{grid-column:1!important;}
.ci-num{grid-column:2!important;width:auto!important;}
.ci-name{grid-column:3!important;min-width:0!important;white-space:normal!important;line-height:1.35!important;}
.ci-tag{grid-column:4!important;justify-self:end!important;}
@media (max-width:720px){
  .wrap,.hd,#tc-buyers.on,#tc-list.on{width:100%!important;max-width:100%!important;}
  .ci{grid-template-columns:20px 30px minmax(0,1fr)!important;}
  .ci-tag{grid-column:3!important;justify-self:start!important;}
  .send-btn{font-size:.78rem!important;}
}

</style>
</head>
<body>
<!-- 載入中 -->
<div id="loading-screen">

<div id="toast"></div><script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: "AIzaSyCQcpPq_rRWlmhkhkYiGbjBJbfRvp_xvQI",
  authDomain: "course-management-70758.firebaseapp.com",
  projectId: "course-management-70758",
  storageBucket: "course-management-70758.firebasestorage.app",
  messagingSenderId: "266316610452",
  appId: "1:266316610452:web:a77dc4a019a0febf876d81"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

// ── 全域資料快取 ──
let _courses = [];
let _cats = [];
let _gs = {};
let _buyers = [];
let _buyerGroups = [];
let _uid = null;

// ── Firebase 讀寫 ──
function userDoc(col) {
  return doc(db, 'users', _uid, 'data', col);
}
async function fbGet(col) {
  const snap = await getDoc(userDoc(col));
  return snap.exists() ? snap.data().value : [];
}
async function fbSet(col, value) {
  await setDoc(userDoc(col), { value });
}

// ── 資料存取（替換 localStorage）──
function lc() { return _courses; }
function sc(d) { _courses = d; fbSet('courses', d); }
function lcat() { return _cats; }
function scat(d) { _cats = d; fbSet('cats', d); renderFbar(); refreshSels(); }
function lgs() { return _gs; }
function sgs(d) { _gs = d; fbSet('gs', d); }
function lb() { return _buyers; }
function sb(d) { _buyers = d; fbSet('buyers', d); renderBuyerGroups(); if(typeof renderJoinList==='function') renderJoinList(); }
function lbg() { return _buyerGroups; }
function sbg(d) { _buyerGroups = d; fbSet('buyerGroups', d); refreshBuyerGroupSels(); renderBuyerGroups(); if(typeof renderJoinList==='function') renderJoinList(); }

// ── 登入 / 登出 ──
window.signInWithGoogle = async function() {
  const provider = new GoogleAuthProvider();
  try { await signInWithPopup(auth, provider); }
  catch(e) { toast('登入失敗：' + e.message); }
};
window.signOutUser = async function() {
  if (!confirm('確定登出？')) return;
  await signOut(auth);
};

// ── 監聽登入狀態 ──
onAuthStateChanged(auth, async (user) => {
  const loading = document.getElementById('loading-screen');
  const loginScreen = document.getElementById('login-screen');
  const appScreen = document.getElementById('app-screen');

  if (user) {
    _uid = user.uid;
    // 載入頭像
    const avatar = document.getElementById('user-avatar');
    if (avatar && user.photoURL) avatar.src = user.photoURL;

    // 從 Firestore 載入資料
    const [courses, cats, gs, buyers, buyerGroups] = await Promise.all([
      fbGet('courses'), fbGet('cats'), fbGet('gs'), fbGet('buyers'), fbGet('buyerGroups')
    ]);
    _courses = Array.isArray(courses) ? courses : [];
    _cats = Array.isArray(cats) ? cats : [];
    _gs = (gs && typeof gs === 'object' && !Array.isArray(gs)) ? gs : {};
    _buyers = Array.isArray(buyers) ? buyers : [];
    _buyerGroups = Array.isArray(buyerGroups) ? buyerGroups : [];

    loading.classList.add('hide');
    loginScreen.classList.add('hide');
    appScreen.style.display = 'block';

    refreshSels();
    refreshBuyerGroupSels();
    renderList();
  } else {
    _uid = null;
    loading.classList.add('hide');
    loginScreen.classList.remove('hide');
    appScreen.style.display = 'none';
  }
});

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function toast(m) { var t=document.getElementById('toast'); t.textContent=m; t.classList.add('show'); setTimeout(function(){t.classList.remove('show');},2000); }
function clip(text,cb) {
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(function(){if(cb)cb();}).catch(function(){fbCopy(text,cb);});
  } else { fbCopy(text,cb); }
}
function fbCopy(text,cb) {
  var ta=document.createElement('textarea'); ta.value=text; ta.style.cssText='position:fixed;opacity:0;top:0;left:0;';
  document.body.appendChild(ta); ta.focus(); ta.select();
  try{document.execCommand('copy');if(cb)cb();}catch(ex){toast('複製失敗');}
  document.body.removeChild(ta);
}
function subYtLinks(s) { return s&&s.ytLinks&&s.ytLinks.length?s.ytLinks:(s&&s.yt?[{label:'YT',url:s.yt}]:[]); }
function hasLink(c) { var yt=c.ytLinks&&c.ytLinks.length?c.ytLinks:(c.yt?[c.yt]:[]); return yt.length>0||!!c.cloud||(c.subs||[]).some(function(s){return subYtLinks(s).length>0||!!s.cloud;}); }
function getNum(c) { var m=(c.name||'').match(/^(\d+)/); return m?parseInt(m[1],10):99999; }
function sortArr(arr) {
  var sel=document.getElementById('sort-sel');
  var mode=sel?sel.value:'num-asc';
  var a=arr.slice();
  if(mode==='num-asc') a.sort(function(p,q){return getNum(p)-getNum(q);});
  else if(mode==='num-desc') a.sort(function(p,q){return getNum(q)-getNum(p);});
  else if(mode==='time-desc') a.sort(function(p,q){return q.id-p.id;});
  else if(mode==='time-asc') a.sort(function(p,q){return p.id-q.id;});
  else if(mode==='name-asc') a.sort(function(p,q){return(p.name||'').localeCompare(q.name||'','zh-TW');});
  return a;
}

function goTab(tab,btn) {
  document.querySelectorAll('.tc').forEach(function(el){el.classList.remove('on');});
  document.querySelectorAll('.tb').forEach(function(el){el.classList.remove('on');});
  document.getElementById('tc-'+tab).classList.add('on');
  if(btn) btn.classList.add('on');
  if(tab==='list') renderList();
  if(tab==='add'){
    document.getElementById('a-type').value='normal';
    clearYt('a-yt');addYtRow('a-yt','','');clearSubs('a-subs');
    toggleCourseType('a');
  }
  if(tab==='buyers') renderPending();
  refreshSels();
}

function toggleCourseType(prefix) {
  var sel=document.getElementById(prefix+'-type');
  if(!sel) return;
  var isLive=sel.value==='live';
  var ytWrap=document.getElementById(prefix+'-yt-wrap');
  var cloudWrap=document.getElementById(prefix+'-cloud-wrap');
  var subsWrap=document.getElementById(prefix+'-subs-wrap');
  if(ytWrap) ytWrap.style.display=isLive?'none':'block';
  if(cloudWrap) cloudWrap.style.display=isLive?'none':'block';
  if(subsWrap) subsWrap.style.display=isLive?'block':'none';
  var subs=document.getElementById(prefix+'-subs');
  if(isLive&&subs&&!subs.querySelector('.sub-row')) addSubRow(prefix+'-subs',{});
}

function ctext(c) {
  var yt=c.ytLinks&&c.ytLinks.length?c.ytLinks:(c.yt?[{label:'YT',url:c.yt}]:[]);
  var t=c.name+'\n';
  yt.forEach(function(l){t+=(l.label||'YT')+'：'+l.url+'\n';});
  if(c.cloud) t+='載點：'+c.cloud+'\n';
  (c.subs||[]).forEach(function(s){
    t+='\n'+(s.title||'直播小課')+'\n';
    subYtLinks(s).forEach(function(l){t+=(l.label||'YT')+'：'+l.url+'\n';});
    if(s.cloud) t+='載點：'+s.cloud+'\n';
  });
  return t.trim();
}

function subText(s) {
  var t=(s.title||'直播小課')+'\n';
  subYtLinks(s).forEach(function(l){t+=(l.label||'YT')+'：'+l.url+'\n';});
  if(s.cloud) t+='載點：'+s.cloud+'\n';
  return t.trim();
}

function renderList() {
  renderFbar();
  var data=lc();
  var q=(document.getElementById('search').value||'').trim().toLowerCase();
  var fil=data.filter(function(c){
    if(activeCat==='nolink') return !hasLink(c);
    if(activeCat==='none') return !c.cat;
    if(activeCat!=='all') return c.cat===activeCat;
    return true;
  }).filter(function(c){return !q||(c.name||'').toLowerCase().indexOf(q)>=0;});
  fil=sortArr(fil);
  var nlc=fil.filter(function(c){return !hasLink(c);}).length;
  document.getElementById('cnt').innerHTML='共 '+fil.length+' 堂'+(nlc?' &nbsp;｜&nbsp; <span style="color:#c53030">⚠️ '+nlc+' 堂無連結</span>':'');
  if(!fil.length){document.getElementById('list').innerHTML='<div class="empty">📭 沒有符合的課程</div>';return;}
  if(q||activeCat!=='all'){document.getElementById('list').innerHTML=fil.map(renderCard).join('');return;}
  var cats=lcat(); var gs=lgs(); var groups=[];
  cats.forEach(function(cat){
    var items=fil.filter(function(c){return c.cat===cat;});
    if(items.length) groups.push({key:'c_'+cat.replace(/\W/g,'_'),label:cat,items:items});
  });
  var nc=fil.filter(function(c){return !c.cat;});
  if(nc.length) groups.push({key:'c_none',label:'未分類',items:nc});
  if(!groups.length){document.getElementById('list').innerHTML='<div class="empty">📭 沒有課程</div>';return;}
  document.getElementById('list').innerHTML=groups.map(function(g){
    var open=gs[g.key]!==false;
    var nl=g.items.filter(function(c){return !hasLink(c);}).length;
    var nlb=nl?' <span style="font-size:.66rem;background:rgba(255,255,255,.25);color:#fff;padding:1px 6px;border-radius:20px;margin-left:3px;">⚠️ '+nl+'</span>':'';
    return '<div><div class="ghd" onclick="toggleGrp(\''+g.key+'\')"><div class="ghd-l"><span class="ghd-t">🏷️ '+esc(g.label)+nlb+'</span><span class="ghd-n">'+g.items.length+' 堂</span></div><span class="garr'+(open?' open':'')+'" id="ga-'+g.key+'">▶</span></div><div class="gbody" id="gb-'+g.key+'" style="display:'+(open?'block':'none')+'">'+g.items.map(renderCard).join('')+'</div></div>';
  }).join('');
}
window.renderList = renderList;

    return '<div class="sub-card"><button class="sub-card-title" onclick="toggleCourseSubs(this)"><span>📡 '+esc(s.title||('直播小課 '+(idx+1)))+'</span><span class="sub-card-arrow">▼</span></button><div class="sub-card-body collapsed">'+ytRow+clRow+allBtn+'</div></div>';

function parseNums(raw) {
  return raw.split(/[、，,\s\/\\\n\r\t]+/).map(function(s){return s.trim();})
    .filter(function(s){return /^\d+$/.test(s);})
    .filter(function(v,i,a){return a.indexOf(v)===i;});
}
function findByNum(num){var n=parseInt(num,10);return lc().find(function(c){var m=(c.name||'').match(/^(\d+)/);return m&&parseInt(m[1],10)===n;})||null;}

function doQuick() {
  var raw=document.getElementById('qinp').value;
  var nums=parseNums(raw);
  var el=document.getElementById('qres');
  if(!nums.length){el.innerHTML='<div class="qempty">請輸入課程編號</div>';return;}
  var results=nums.map(function(n){return{n:n,c:findByNum(n)};});
  var found=results.filter(function(r){return r.c&&hasLink(r.c);});
  var html='';
  results.forEach(function(r){
    if(!r.c){html+='<div class="qnf">⚠️ 找不到編號 <b>'+esc(r.n)+'</b></div>';return;}
    if(!hasLink(r.c)){html+='<div class="qnf">⚠️ 編號 <b>'+esc(r.n)+'</b>「'+esc(r.c.name)+'」尚無連結</div>';return;}
    var yt=r.c.ytLinks&&r.c.ytLinks.length?r.c.ytLinks:(r.c.yt?[{label:'YT',url:r.c.yt}]:[]);
    var ytH=yt.map(function(l){return '<div class="lr"><span class="badge byt">'+esc(l.label||'YT')+'</span><span class="ltext"><a href="'+esc(l.url)+'" target="_blank">'+esc(l.url)+'</a></span><button class="bcopy" data-url="'+esc(l.url)+'" onclick="cpBtn(this)">複製</button></div>';}).join('');
    var clH=r.c.cloud?'<div class="lr"><span class="badge bcl">載點</span><span class="ltext"><a href="'+esc(r.c.cloud)+'" target="_blank">'+esc(r.c.cloud)+'</a></span><button class="bcopy" data-url="'+esc(r.c.cloud)+'" onclick="cpBtn(this)">複製</button></div>':'';
    html+='<div class="qitem"><div class="qname">📖 '+esc(r.c.name)+'</div>'+ytH+clH+'<button class="bcopy1" data-id="'+r.c.id+'" onclick="cpOne(this)">📋 複製此堂全部</button></div>';
  });
  if(found.length>=2){var ids=found.map(function(r){return r.c.id;}).join(',');html+='<button class="bcopyall" data-ids="'+ids+'" onclick="cpAll(this)">📋 一鍵複製全部 '+found.length+' 堂</button>';}
  el.innerHTML=html;
}
window.doQuick = doQuick;

function cpAll(btn) {
  var ids = btn.dataset.ids.split(',').map(function(s){ return parseFloat(s.trim()); });
  var texts = ids.map(function(id){
    var c = lc().find(function(z){ return z.id === id; });

function addCourse() {
  var name=document.getElementById('a-name').value.trim();
  if(!name){toast('⚠️ 請輸入課程名稱');return;}
  var type=document.getElementById('a-type').value;
  var yt=type==='live'?[]:getYtRows('a-yt');
  var cloud=type==='live'?'':document.getElementById('a-cloud').value.trim();
  var subs=type==='live'?getSubRows('a-subs'):[];
  var cat=document.getElementById('a-cat').value.trim();
  var note=document.getElementById('a-note').value.trim();
  var data=lc().slice();
  data.unshift({id:Date.now(),name:name,type:type,ytLinks:yt,cloud:cloud,subs:subs,cat:cat,note:note});
  sc(data);
  ['a-name','a-cloud','a-note'].forEach(function(id){document.getElementById(id).value='';});
  document.getElementById('a-cat').value='';
  document.getElementById('a-type').value='normal';
  clearYt('a-yt'); addYtRow('a-yt','','');
  clearSubs('a-subs');
  toggleCourseType('a');
  toast('✅ 課程已新增！');
  goTab('list',document.querySelectorAll('.tb')[0]);
}

  var yt=c.ytLinks&&c.ytLinks.length?c.ytLinks:(c.yt?[{label:'YT',url:c.yt}]:[]);

  clearSubs('e-subs');

function parseLine(line) {
  var yt=line.match(/^(YT|YouTube)\s*(?:（([^）]*)）)?\s*[：:]\s*(.+)$/i);
  if(yt) return{type:'yt',label:yt[2]?'YT（'+yt[2]+'）':'YT',url:yt[3].trim()};
  var cl=line.match(/^(載點|雲端|cloud|mega|drive)\s*(?:（[^）]*）)?\s*[：:]\s*(.+)$/i);
  if(cl) return{type:'cloud',url:cl[2].trim()};
  var nt=line.match(/^(備註|note)\s*[：:]\s*(.+)$/i);
  if(nt) return{type:'note',text:nt[2].trim()};
  if(/^https?:\/\//i.test(line)){if(/youtube|youtu\.be/i.test(line))return{type:'yt',label:'YT',url:line};return{type:'cloud',url:line};}
  return{type:'name',text:line};
}

function parseBatch() {
  var raw=document.getElementById('b-inp').value.trim();
  if(!raw){toast('⚠️ 請先貼上資料');return;}
  var blocks=raw.split(/\n\s*\n+/);
  batchData=[];
  blocks.forEach(function(block){
    var lines=block.trim().split('\n').map(function(l){return l.trim();}).filter(Boolean);
    if(!lines.length) return;
    var item={name:'',ytLinks:[],cloud:'',note:''};
    lines.forEach(function(line){
      var p=parseLine(line);
      if(p.type==='name'&&!item.name) item.name=p.text;
      else if(p.type==='yt') item.ytLinks.push({label:p.label,url:p.url});
      else if(p.type==='cloud') item.cloud=p.url;
      else if(p.type==='note') item.note=p.text;
    });
    if(item.name) batchData.push(item);
  });
  var prev=document.getElementById('bprev');
  if(!batchData.length){prev.innerHTML='<div class="empty">⚠️ 解析不到任何課程</div>';document.getElementById('b-imp').disabled=true;return;}
  var html='<div class="prev-wrap"><h4>解析到 '+batchData.length+' 堂課程：</h4>';
  batchData.forEach(function(item){
    var links=item.ytLinks.map(function(l){return l.label+'：'+l.url;}).join('、');
    if(item.cloud) links+=(links?'、':'')+'載點：'+item.cloud;
    html+='<div class="pi"><div class="pn">'+esc(item.name)+'</div>';
    if(links) html+='<div class="pl">'+esc(links)+'</div>';
    html+='</div>';
  });
  html+='</div>';
  prev.innerHTML=html;
  document.getElementById('b-imp').disabled=false;
}
window.parseBatch = parseBatch;

function importBatch() {
  if(!batchData.length){toast('⚠️ 請先預覽解析');return;}
  var cat=document.getElementById('b-cat').value.trim();

    data.unshift({id:Date.now()+Math.random(),name:item.name,ytLinks:item.ytLinks,cloud:item.cloud,cat:cat,note:item.note});

function addBuyer() {
  var raw=document.getElementById('nb-nums').value;
  var nums=parseNums(raw);
  var mode=document.getElementById('nb-mode').value;
  var isJoin=mode==='join';
  var type=isJoin?'buy':document.getElementById('nb-type').value;
  var groupName=document.getElementById('nb-group-name').value.trim();
  var joinOwner=(document.getElementById('nb-join-owner')&&document.getElementById('nb-join-owner').value||'').trim();
  var status=document.getElementById('nb-status').value;
  var buyerEntries=isJoin?[{name:joinOwner,status:status}]:getNewBuyerEntries();
  if(isJoin&&!joinOwner){toast('⚠️ 請輸入對方名稱');return;}
  if(!isJoin&&!buyerEntries.length){toast('⚠️ 請輸入姓名');return;}
  var groupId='';
  if(mode==='group'){
    if(!groupName){toast('⚠️ 請輸入團購名稱');return;}
    groupId=getOrCreateBuyerGroup(groupName,nums,mode);
  } else if(isJoin&&groupName){
    groupId=getOrCreateBuyerGroup(groupName,nums,mode);
  }
  var group=findBuyerGroup(groupId);
  if(!nums.length&&type==='buy'&&group&&(group.nums||[]).length) nums=(group.nums||[]).slice();
  if(!nums.length && type !== 'exchange' && type !== 'gift'){toast('⚠️ 請輸入課程編號');return;}
  var note=document.getElementById('nb-note').value.trim();
  if((mode==='group'||mode==='join')&&groupId&&note){
    var groupsForNote=lbg().slice();
    var groupForNote=groupsForNote.find(function(g){return String(g.id)===String(groupId);});
    if(groupForNote){groupForNote.note=note;sbg(groupsForNote);}
  }
  var purchaseNote=(mode==='group'||mode==='join')?buyerGroupNote(groupId,findBuyerGroup(groupId))||note:note;
  var exchange=null;
  if(type==='exchange'||type==='gift'){
    var inNums=parseNums(document.getElementById('nb-ex-in').value);
    var outNums=type==='exchange'?parseNums(document.getElementById('nb-ex-out').value):[];
    exchange={
      type:type,
      inNums:inNums,
      inCourse:document.getElementById('nb-ex-in').value.trim(),
      inStatus:document.getElementById('nb-ex-in-status').value,
      inReceivedNums:document.getElementById('nb-ex-in-status').value==='received'?inNums.slice():[],
      outNums:outNums,
      outCourse:document.getElementById('nb-ex-out').value.trim(),
      outStatus:type==='exchange'?document.getElementById('nb-ex-out-status').value:'',
      outSentNums:type==='exchange'&&document.getElementById('nb-ex-out-status').value==='sent'?outNums.filter(function(n){var c=findByNum(n);return c&&hasLink(c);}):[]
    };
  }
  var buyers=lb().slice();
  var baseId=Date.now();
  buyerEntries.slice().reverse().forEach(function(entry,idx){
    var purchases=[{id:baseId+idx,status:entry.status||status,nums:nums.slice(),note:purchaseNote,sentNums:[],exchange:exchange?JSON.parse(JSON.stringify(exchange)):null}];
    buyers.unshift({id:baseId+1000+idx,name:entry.name,groupId:groupId,mode:isJoin?'join':mode,purchases:purchases});
  });
  sb(buyers);
  resetBuyerRows();
  document.getElementById('nb-group-name').value='';
  if(document.getElementById('nb-join-owner')) document.getElementById('nb-join-owner').value='';
  document.getElementById('nb-nums').value='';
  document.getElementById('nb-note').value='';
  document.getElementById('nb-preview').innerHTML='';
  document.getElementById('nb-status').value='paid';
  document.getElementById('nb-mode').value='single';
  toggleBuyerMode();
  document.getElementById('nb-type').value='buy';
  document.getElementById('nb-exbox').style.display='none';
  document.getElementById('nb-ex-in').value='';
  document.getElementById('nb-ex-in-preview').innerHTML='';
  document.getElementById('nb-ex-out').value='';
  document.getElementById('nb-ex-out-preview').innerHTML='';
  toast(mode==='join'?'✅ 已新增跟團紀錄！':'✅ 已新增 '+buyerEntries.length+' 位購買人！');
  goBTab('pending',document.querySelectorAll('.bstab')[0]);
}

function buyerGroupStats(groupId) {
  var buyers=lb().filter(function(b){return buyerGroupId(b)===groupId;});
  var paid=buyers.filter(function(b){return buyerHasPaymentStatus(b,'paid');}).length;
  var pre=buyers.filter(function(b){return buyerHasPaymentStatus(b,'pre');}).length;
  var pending=buyers.filter(buyerNeedsPending).length;
  return {buyers:buyers.length,paid:paid,pre:pre,pending:pending};
}

function groupMembers(groupId) {
  return lb().filter(function(b){return buyerGroupId(b)===String(groupId);});
}

function buyerGroupNote(groupId, group) {
  if(group&&group.note) return group.note;
  var found='';
  groupMembers(groupId).some(function(b){
    return (b.purchases||[]).some(function(p){
      if(!p.exchange&&p.note){found=p.note;return true;}
      return false;
    });
  });
  return found;
}

function firstBuyPurchase(buyer) {
  return (buyer.purchases||[]).find(function(p){return !p.exchange;});
}

function buyerPaymentStatus(buyer) {
  var pur=firstBuyPurchase(buyer);
  return pur ? (pur.status||'paid') : 'paid';
}

function groupNeedsPending(g) {
  var nums=g.nums||[];
  if(!nums.length) return false;
  var sentNums=g.sentNums||[];
  return nums.some(function(n){return sentNums.indexOf(n)<0;});
}

function groupMatchesPaymentFilter(g) {
  if(buyerPayFilter==='all') return true;
  if(buyerPayFilter==='completed') return true;
  if(buyerPayFilter==='exchange') return false;
  var buyers=lb().filter(function(b){return buyerGroupId(b)===String(g.id);});
  return buyers.some(function(b){return buyerHasPaymentStatus(b,buyerPayFilter);});
}

function saveBuyerGroupNums(btn) {
  var gid=String(btn.dataset.gid);
  var card=btn.closest('.group-card');
  var inp=card?card.querySelector('.group-nums'):null;
  var nameInp=card?card.querySelector('.group-name-inp'):null;
  var nums=parseNums(inp?inp.value:'');
  var groups=lbg().slice();
  var g=groups.find(function(x){return String(x.id)===gid;});
  if(!g) return;
  var oldNums=(g.nums||[]).slice();
  if(nameInp&&(nameInp.value||'').trim()) g.name=nameInp.value.trim();
  g.nums=nums;
  g.sentNums=(g.sentNums||[]).filter(function(n){return nums.indexOf(n)>=0;});
  sbg(groups);

  var buyers=lb().slice();
  buyers.forEach(function(b){
    if(buyerGroupId(b)!==gid) return;
    if(!b.purchases) b.purchases=[];
    var pur=b.purchases.find(function(p){return !p.exchange;});
    if(!pur){
      pur={id:Date.now(),status:'paid',nums:[],note:'',sentNums:[],exchange:null};
      b.purchases.push(pur);
    }
    if(arrSame(pur.nums||[],oldNums)) pur.nums=nums.slice();
    else nums.forEach(function(n){if((pur.nums||[]).indexOf(n)<0){if(!pur.nums)pur.nums=[];pur.nums.push(n);}});
    pur.sentNums=(pur.sentNums||[]).filter(function(n){return (pur.nums||[]).indexOf(n)>=0;});
  });
  sb(buyers);
  renderPending(); renderAllBuyers(); toast('✅ 團購課程已儲存');
}

function copyBuyerGroupLinks(btn) {

  if(inp){
    var typedNums=parseNums(inp.value);

  }
  var groups=lbg().slice();

  if(!g) return;
  var sentNums=g.sentNums||[];
  var pendingNums=(g.nums||[]).filter(function(n){var c=findByNum(n);return c&&hasLink(c)&&sentNums.indexOf(n)<0;});
  if(!pendingNums.length){toast('沒有可複製的團購連結');return;}
  var texts=pendingNums.map(function(n){var c=findByNum(n);return c?ctext(c):'';}).filter(Boolean);
  clip(texts.join('\n\n'),function(){
    if(!g.sentNums) g.sentNums=[];
    pendingNums.forEach(function(n){if(g.sentNums.indexOf(n)<0)g.sentNums.push(n);});
    sbg(groups);
    var buyers=lb().slice();
    buyers.forEach(function(b){
      if(buyerGroupId(b)!==gid) return;
      (b.purchases||[]).forEach(function(pur){
        if(pur.exchange) return;
        if(!pur.sentNums) pur.sentNums=[];
        pendingNums.forEach(function(n){
          if((pur.nums||[]).indexOf(n)>=0&&pur.sentNums.indexOf(n)<0) pur.sentNums.push(n);

function sortNumsByCourseOrder(nums) {
  return (nums||[]).map(String).slice().sort(function(a,b){
    var an=parseInt(a,10), bn=parseInt(b,10);
    if(!isNaN(an)&&!isNaN(bn)&&an!==bn) return an-bn;
    return a.localeCompare(b);
  });
}

function exchangeNums(ex, dir) {
  if(!ex) return [];
  if(dir==='in') return sortNumsByCourseOrder((ex.inNums&&ex.inNums.length)?ex.inNums:parseNums(ex.inCourse||''));
  return sortNumsByCourseOrder((ex.outNums&&ex.outNums.length)?ex.outNums:parseNums(ex.outCourse||''));
}

function exchangeDoneNums(ex, dir) {
  if(!ex) return [];
  if(dir==='in'){
    if(Array.isArray(ex.inReceivedNums)) return ex.inReceivedNums.map(String);
    return ex.inStatus==='received'?exchangeNums(ex,'in').slice():[];
  }
  if(Array.isArray(ex.outSentNums)) return ex.outSentNums.map(String);
  if(ex.outStatus==='sent'){
    return exchangeNums(ex,'out').filter(function(n){var c=findByNum(n);return c&&hasLink(c);});
  }
  return [];
}

function exchangeItemDone(ex, dir, num) {
  return exchangeDoneNums(ex,dir).indexOf(String(num))>=0;
}

function exchangeHasPending(ex) {
  if(!ex) return false;
  var inPending=exchangeNums(ex,'in').some(function(n){return !exchangeItemDone(ex,'in',n);});
  if(ex.type==='gift') return inPending;
  var outPending=exchangeNums(ex,'out').some(function(n){return !exchangeItemDone(ex,'out',n);});
  return inPending||outPending;
}

function buyerNeedsPending(buyer) {
  return (buyer.purchases || []).some(function(pur){ return purchaseNeedsPending(pur); });
}

function purchaseNeedsPending(pur) {
  if(!pur) return false;
  if(pur.exchange) return exchangeHasPending(pur.exchange);
  var sentNums = pur.sentNums || [];
  return (pur.nums || []).some(function(n){ return sentNums.indexOf(n) < 0; });
}

function purchaseMatchesPendingFilter(pur) {
  var needs = purchaseNeedsPending(pur);
  if(buyerPayFilter === 'completed') return !needs;
  if(!needs) return false;
  if(buyerPayFilter === 'exchange') return !!(pur.exchange && pur.exchange.type === 'exchange');
  if(buyerPayFilter === 'paid' || buyerPayFilter === 'pre') return !pur.exchange && (pur.status || 'paid') === buyerPayFilter;
  return true;
}

function buyerHistorySummary(buyer) {
  var purchases=buyer.purchases||[];
  var nums=[];
  var exchangeCount=0;
  purchases.forEach(function(pur){
    if(pur.exchange) exchangeCount++;
    (pur.nums||[]).forEach(function(n){if(nums.indexOf(n)<0) nums.push(n);});
  });
  var names=nums.map(function(n){
    var c=findByNum(n);
    return c?'#'+n+' '+c.name:'#'+n;
  });
  return {
    purchaseCount:purchases.length,

function renderPending() {
  var buyers=lb();
  var el=document.getElementById('pending-list');
  var q=(document.getElementById('pending-buyer-search')&&document.getElementById('pending-buyer-search').value||'').trim().toLowerCase();
  if(!buyers.length&&!lbg().length){el.innerHTML='<div class="empty">📭 尚無購買人</div>';return;}
  if(buyerPayFilter==='join'){
    var search=document.getElementById('pending-buyer-search');
    if(search) search.placeholder='🔍 搜尋對方或跟團名稱...';
    renderJoinList(el,q);
    return;
  } else {
    var search=document.getElementById('pending-buyer-search');
    if(search) search.placeholder='🔍 搜尋購買人...';
  }
  var html='';
  lbg().forEach(function(g){
    if(isJoinGroup(g)) return;
    if(q&&(g.name||'').toLowerCase().indexOf(q)<0&&!groupMembers(String(g.id)).some(function(b){return (b.name||'').toLowerCase().indexOf(q)>=0;})) return;
    var needs=groupNeedsPending(g);
    if(buyerPayFilter==='completed'){
      if(needs) return;
    } else if(!needs) return;
    if(!groupMatchesPaymentFilter(g)) return;
    html+=renderPendingGroupCard(g);
  });
  buyers.forEach(function(buyer){
    if(buyer.mode==='join') return;
    if(q&&(buyer.name||'').toLowerCase().indexOf(q)<0&&(buyerGroupName(buyerGroupId(buyer))||'').toLowerCase().indexOf(q)<0) return;
    if(buyerGroupId(buyer)&&!buyerHasExchange(buyer)) return;
    var needs=buyerNeedsPending(buyer);
    if(buyerPayFilter==='completed'){
      if(!buyerHasCompletedPurchase(buyer)) return;
    } else if(!needs) return;
    if(buyerPayFilter==='exchange'&&!buyerHasExchange(buyer)) return;
    if(buyerPayFilter!=='all'&&buyerPayFilter!=='exchange'&&buyerPayFilter!=='completed'&&!buyerHasPaymentStatus(buyer,buyerPayFilter)) return;
    html+=renderBuyerCard(buyer,'pending');
  });
  el.innerHTML=html||(buyerPayFilter==='completed'?'<div class="empty">📭 尚無已完成紀錄</div>':'<div class="empty">✅ 全部已發送完畢</div>');
}

function toggleSent(cb) {
  var bid=parseInt(cb.dataset.bid);
  var pi=parseInt(cb.dataset.pi);
  var num=cb.dataset.num;
  var buyers=lb().slice();
  var b=buyers.find(function(x){return x.id===bid;}); if(!b) return;
  var pur=b.purchases[pi]; if(!pur) return;
  if(!pur.sentNums) pur.sentNums=[];
  if(cb.checked){if(pur.sentNums.indexOf(num)<0)pur.sentNums.push(num);}
  else{pur.sentNums=pur.sentNums.filter(function(n){return n!==num;});}
  sb(buyers); renderPending();
}

function toggleExStatus(cb) {
  var bid=parseInt(cb.dataset.bid);
  var pi=parseInt(cb.dataset.pi);
  var dir=cb.dataset.exdir;
  var num=String(cb.dataset.num||'');
  var buyers=lb().slice();
  var b=buyers.find(function(x){return x.id===bid;}); if(!b) return;
  var pur=b.purchases[pi]; if(!pur||!pur.exchange) return;
  if(dir==='in'){
    if(!Array.isArray(pur.exchange.inReceivedNums)) pur.exchange.inReceivedNums=exchangeDoneNums(pur.exchange,'in').slice();
    if(num){
      if(cb.checked){if(pur.exchange.inReceivedNums.indexOf(num)<0) pur.exchange.inReceivedNums.push(num);}
      else{pur.exchange.inReceivedNums=pur.exchange.inReceivedNums.filter(function(n){return n!==num;});}
      pur.exchange.inStatus=exchangeNums(pur.exchange,'in').every(function(n){return pur.exchange.inReceivedNums.indexOf(String(n))>=0;})?'received':'pending';
    } else {
      pur.exchange.inStatus=cb.checked?'received':'pending';
      pur.exchange.inReceivedNums=cb.checked?exchangeNums(pur.exchange,'in').slice():[];
    }
  } else {
    if(!Array.isArray(pur.exchange.outSentNums)) pur.exchange.outSentNums=exchangeDoneNums(pur.exchange,'out').slice();
    if(num){
      if(cb.checked){if(pur.exchange.outSentNums.indexOf(num)<0) pur.exchange.outSentNums.push(num);}
      else{pur.exchange.outSentNums=pur.exchange.outSentNums.filter(function(n){return n!==num;});}
      pur.exchange.outStatus=exchangeNums(pur.exchange,'out').every(function(n){return pur.exchange.outSentNums.indexOf(String(n))>=0;})?'sent':'pending';
    } else {
      pur.exchange.outStatus=cb.checked?'sent':'pending';
      pur.exchange.outSentNums=cb.checked?exchangeNums(pur.exchange,'out').filter(function(n){var c=findByNum(n);return c&&hasLink(c);}):[];
    }
  }
  sb(buyers); renderPending(); renderAllBuyers();
}
window.toggleExStatus = toggleExStatus;

      '<div class="eb-pur-buy-wrap" style="display:'+buyDisplay+'">'+
        '<div class="fg"><label>付款狀態</label><select class="eb-pur-status"><option value="paid"'+((pur.status||'paid')==='paid'?' selected':'')+'>✅ 已付款</option><option value="pre"'+((pur.status||'paid')==='pre'?' selected':'')+'>⏳ 預約未付款</option></select></div>'+
        '<div class="fg"><label>購買課程編號</label><input class="num-inp eb-pur-nums" type="text" value="'+esc((pur.nums||[]).join(' '))+'" placeholder="例：80 30 33" oninput="previewNumsInRow(this)"/><div class="num-hint">用空格、頓號或逗號分隔</div><div class="parsed-nums eb-pur-preview"></div></div>'+
      '</div>'+
      '<div class="eb-pur-ex-wrap" style="display:'+exDisplay+'">'+
        '<div class="fg"><label>對方給我的課程名稱</label><input class="num-inp eb-ex-in" type="text" value="'+esc(inText)+'" placeholder="例：02 05 08" oninput="previewNumsInRow(this)"/><div class="num-hint">用空格、頓號或逗號分隔</div><div class="parsed-nums eb-pur-preview"></div><select class="eb-ex-in-status" style="margin-top:5px;"><option value="pending"'+((ex.inStatus||'pending')==='pending'?' selected':'')+'>⏳ 未開課／待收</option><option value="received"'+(ex.inStatus==='received'?' selected':'')+'>✅ 已收到</option></select></div>'+
        '<div class="fg eb-ex-out-wrap" style="display:'+outDisplay+'"><label>我給對方的課程名稱</label><input class="num-inp eb-ex-out" type="text" value="'+esc(outText)+'" placeholder="例：02 05 08" oninput="previewNumsInRow(this)"/><div class="num-hint">用空格、頓號或逗號分隔</div><div class="parsed-nums eb-pur-preview"></div><select class="eb-ex-out-status" style="margin-top:5px;"><option value="pending"'+((ex.outStatus||'pending')==='pending'?' selected':'')+'>⏳ 待發</option><option value="sent"'+(ex.outStatus==='sent'?' selected':'')+'>✅ 已發</option></select></div>'+
      '</div>'+
      '<div class="fg"><label>備註</label><textarea class="eb-pur-note" placeholder="備註...">'+esc(pur.note||'')+'</textarea></div>'+
    '</div>';
  }).join('');
  box.querySelectorAll('.num-inp').forEach(previewNumsInRow);
}

function previewNumsInRow(inp) {
  var wrap=inp.closest('.fg');
  var prev=wrap?wrap.querySelector('.parsed-nums'):null;
  if(prev) prev.innerHTML=parseNums(inp.value).map(function(n){
    var c=findByNum(n);
    return '<span class="pnum'+(c?'':' nf')+'">'+(c?esc(c.name):'#'+esc(n)+' 找不到')+'</span>';
  }).join('');
}
window.previewNumsInRow = previewNumsInRow;

function toggleEditPurchaseType(sel) {
  var row=sel.closest('.eb-pur-row');
  if(!row) return;
  var type=sel.value;
  var buy=row.querySelector('.eb-pur-buy-wrap');
  var ex=row.querySelector('.eb-pur-ex-wrap');
  var out=row.querySelector('.eb-ex-out-wrap');
  if(buy) buy.style.display=type==='buy'?'block':'none';
  if(ex) ex.style.display=type==='buy'?'none':'block';
  if(out) out.style.display=type==='exchange'?'block':'none';
}
window.toggleEditPurchaseType = toggleEditPurchaseType;

function openEditBuyer(btn) {
  var bid=parseInt(btn.dataset.bid);
  var onlyPi=btn.dataset.pi!==undefined&&btn.dataset.pi!==''?parseInt(btn.dataset.pi,10):null;
  var b=lb().find(function(x){return x.id===bid;}); if(!b) return;
  refreshBuyerGroupSels();
  document.querySelector('#editBuyerMo h3').textContent=Number.isInteger(onlyPi)?'✏️ 編輯第 '+(onlyPi+1)+' 筆購買':'✏️ 編輯購買人';
  document.getElementById('eb-id').value=b.id;
  document.getElementById('eb-name').value=b.name||'';
  document.getElementById('eb-group').value=buyerGroupId(b);
  renderEditBuyerPurchases(b,onlyPi);
  openMo('editBuyerMo');
}
window.openEditBuyer = openEditBuyer;

function buildEditPurchaseFromRow(row, old) {
  var pi=parseInt(row.dataset.pi);
  old=old||{};
  var type=row.querySelector('.eb-pur-type').value;
  var note=(row.querySelector('.eb-pur-note').value||'').trim();
  if(type==='buy'){
    var nums=parseNums(row.querySelector('.eb-pur-nums').value);
    return {
      id: old.id||Date.now()+pi,
      status: row.querySelector('.eb-pur-status').value||'paid',
      nums: nums,
      note: note,
      sentNums: (old.sentNums||[]).filter(function(n){return nums.indexOf(n)>=0;}),
      exchange: null
    };
  }
  var inRaw=(row.querySelector('.eb-ex-in').value||'').trim();
  var outRaw=type==='exchange'?(row.querySelector('.eb-ex-out').value||'').trim():'';
  var oldEx=old.exchange||{};
  var inNums=parseNums(inRaw);
  var outNums=type==='exchange'?parseNums(outRaw):[];
  var inStatus=row.querySelector('.eb-ex-in-status').value||'pending';
  var outStatus=type==='exchange'?(row.querySelector('.eb-ex-out-status').value||'pending'):'';
  var inReceivedNums=inStatus==='received'?inNums.slice():(Array.isArray(oldEx.inReceivedNums)?oldEx.inReceivedNums.filter(function(n){return inNums.indexOf(String(n))>=0;}):[]);
  var outSentNums=outStatus==='sent'?outNums.filter(function(n){var c=findByNum(n);return c&&hasLink(c);}):(Array.isArray(oldEx.outSentNums)?oldEx.outSentNums.filter(function(n){return outNums.indexOf(String(n))>=0;}):[]);
  return {
    id: old.id||Date.now()+pi,
    status: old.status||'paid',
    nums: [],
    note: note,
    sentNums: old.sentNums||[],
    exchange: {
      type: type,
      inNums: inNums,
      inCourse: inRaw,
      inStatus: inNums.length&&inReceivedNums.length===inNums.length?'received':'pending',
      inReceivedNums: inReceivedNums,
      outNums: outNums,
      outCourse: outRaw,
      outStatus: type==='exchange'&&outNums.length&&outSentNums.length===outNums.length?'sent':outStatus,
      outSentNums: outSentNums
    }
  };
}

function saveEditBuyer() {
  var id=parseInt(document.getElementById('eb-id').value);
  var name=document.getElementById('eb-name').value.trim();
  if(!name){toast('⚠️ 請輸入姓名');return;}
  var groupId=document.getElementById('eb-group').value||'';
  var buyers=lb().slice();
  var i=buyers.findIndex(function(x){return x.id===id;}); if(i===-1) return;
  buyers[i].name=name;
  buyers[i].groupId=groupId;
  var oldPurchases=buyers[i].purchases||[];
  var rows=Array.from(document.querySelectorAll('#eb-purchases .eb-pur-row'));
  var onlyPiRaw=document.getElementById('eb-purchases').dataset.onlyPi;
  if(onlyPiRaw!==''){
    var onlyPi=parseInt(onlyPiRaw,10);
    var nextPurchases=oldPurchases.slice();
    rows.forEach(function(row){
      var pi=parseInt(row.dataset.pi);
      nextPurchases[pi]=buildEditPurchaseFromRow(row, oldPurchases[pi]||{});
    });
    buyers[i].purchases=nextPurchases.filter(Boolean);
  } else {
    buyers[i].purchases=rows.map(function(row){
      var pi=parseInt(row.dataset.pi);
      return buildEditPurchaseFromRow(row, oldPurchases[pi]||{});
    });
  }
  sb(buyers); closeMo('editBuyerMo');
  renderPending(); renderAllBuyers(); toast('✅ 已儲存！');
}
window.saveEditBuyer = saveEditBuyer;

function delBuyer(btn) {
  var bid=parseInt(btn.dataset.bid);
  if(!confirm('確定刪除此購買人？')) return;
  sb(lb().filter(function(x){return x.id!==bid;}));
  renderPending(); renderAllBuyers(); toast('🗑️ 已刪除');
}
window.delBuyer = delBuyer;

function openAddPur(btn) {
  var bid=parseInt(btn.dataset.bid);
  document.getElementById('ap-bid').value=bid;
  document.getElementById('ap-nums').value='';
  document.getElementById('ap-preview').innerHTML='';
  document.getElementById('ap-note').value='';
  document.getElementById('ap-status').value='paid';
  document.getElementById('ap-type').value='buy';        // ← 加這行
  document.getElementById('ap-ex-in').value='';          // ← 加這行
  document.getElementById('ap-ex-out').value='';         // ← 加這行
  toggleExBox('ap');                                      // ← 加這行
  openMo('addPurMo');
}
window.openAddPur = openAddPur;


function saveAddPur() {
  var bid=parseInt(document.getElementById('ap-bid').value);
  var raw=document.getElementById('ap-nums').value;
  var nums=parseNums(raw);
  var type=document.getElementById('ap-type').value;
  if(!nums.length && type !== 'exchange' && type !== 'gift'){toast('⚠️ 請輸入課程編號！');return;}
  var status=document.getElementById('ap-status').value;
  var note=document.getElementById('ap-note').value.trim();
  var exchange=null;
  if(type==='exchange'||type==='gift'){
    var inNums=parseNums(document.getElementById('ap-ex-in').value);
    var outNums=type==='exchange'?parseNums(document.getElementById('ap-ex-out').value):[];
    exchange={
      type:type,
      inNums:inNums,
      inCourse:document.getElementById('ap-ex-in').value.trim(),
      inStatus:document.getElementById('ap-ex-in-status').value,
      inReceivedNums:document.getElementById('ap-ex-in-status').value==='received'?inNums.slice():[],
      outNums:outNums,
      outCourse:document.getElementById('ap-ex-out').value.trim(),
      outStatus:type==='exchange'?document.getElementById('ap-ex-out-status').value:'',
      outSentNums:type==='exchange'&&document.getElementById('ap-ex-out-status').value==='sent'?outNums.filter(function(n){var c=findByNum(n);return c&&hasLink(c);}):[]
    };
  }
  var buyers=lb().slice();
  var b=buyers.find(function(x){return x.id===bid;});
  if(!b) return;
  b.purchases.push({id:Date.now(),status:status,nums:nums,note:note,sentNums:[],exchange:exchange});
  sb(buyers);
  closeMo('addPurMo');
  renderPending(); renderAllBuyers(); toast('✅ 購買紀錄已新增！');
}
window.saveAddPur = saveAddPur;


function toggleExBox(prefix) {
  var type = document.getElementById(prefix+'-type').value;
  var box = document.getElementById(prefix+'-exbox');
  var outWrap = document.getElementById(prefix+'-ex-out-wrap');
  var paymentWrap = document.getElementById(prefix+'-payment-wrap');
  var courseIdWrap = document.getElementById(prefix+'-courseid-wrap');

  if(type === 'buy') {
    box.style.display = 'none';
    if(paymentWrap) paymentWrap.style.display = prefix==='nb'?'none':'block';
    if(courseIdWrap) courseIdWrap.style.display = 'block';
  } else if(type === 'exchange') {
    box.style.display = 'block';
    outWrap.style.display = 'block';
    if(paymentWrap) paymentWrap.style.display = 'none';
    if(courseIdWrap) courseIdWrap.style.display = 'none';
  } else if(type === 'gift') {
    box.style.display = 'block';
    outWrap.style.display = 'none';
    if(paymentWrap) paymentWrap.style.display = 'none';
    if(courseIdWrap) courseIdWrap.style.display = 'none';
  }
  if(prefix==='nb') syncBuyerRowsForType();
}
window.toggleExBox = toggleExBox;
window.lc = lc;
window.lb = lb;
window.findByNum = findByNum;
window.renderPending = renderPending;
window.previewNums = previewNums;



</script>
